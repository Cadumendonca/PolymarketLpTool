{% extends "base.html" %}
{% block title %}Visão Geral{% endblock %}
{% block body %}
<div class="card">
  <h2>Status em Tempo Real (igual ao Telegram /status)</h2>
  {% if ok %}
  <pre class="status">{% for line in status_lines %}{{ line }}
{% endfor %}</pre>
  {% else %}
  <p class="flash error">{{ error }}</p>
  {% endif %}
</div>
<p class="muted">Label da Conta: {{ account_label }}</p>
{% endblock %}
